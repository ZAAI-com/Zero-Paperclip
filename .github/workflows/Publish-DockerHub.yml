# Publish-DockerHub.yml — Build multi-arch Docker image and push to Docker Hub.
# Triggers on push to main, weekly (picks up upstream Paperclip updates),
# and manual dispatch.

name: Publish DockerHub

on:
  push:
    branches: [main]
  schedule:
    # Every Wednesday at 16:00 Munich time (14:00 UTC) — rebuilds to pick up upstream changes
    - cron: "0 14 * * 3"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate date tag
        id: date
        run: echo "tag=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            zaaicom/paperclip-synology:latest
            zaaicom/paperclip-synology:${{ steps.date.outputs.tag }}
